name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            target_name: vm_xml_tool
            artifact_name: vm_xml_tool-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            target_name: vm_xml_tool.exe
            artifact_name: vm_xml_tool-windows-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            target_name: vm_xml_tool
            artifact_name: vm_xml_tool-macos-x86_64

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Build
      run: cargo build --release --target ${{ matrix.target }} --verbose

    - name: Run tests
      run: cargo test --verbose

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: target/${{ matrix.target }}/release/${{ matrix.target_name }}
