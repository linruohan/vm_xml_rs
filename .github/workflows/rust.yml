name: Rust

on:
  push:
    branches: ["main"]
    tags:
      - "v*"
  pull_request:
    branches: ["main"]
  workflow_dispatch:
  release:
    types: [created]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            target_name: vm_xml_tool
            artifact_name: vm_xml_tool-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            target_name: vm_xml_tool.exe
            artifact_name: vm_xml_tool-windows-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            target_name: vm_xml_tool
            artifact_name: vm_xml_tool-macos-x86_64

    steps:
      - uses: actions/checkout@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --verbose

      - name: Run tests
        run: cargo test --verbose

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.target_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Create release archives
        run: |
          cd artifacts
          zip -r vm_xml_tool-windows-x86_64.zip vm_xml_tool-windows-x86_64/
          zip -r vm_xml_tool-linux-x86_64.zip vm_xml_tool-linux-x86_64/
          zip -r vm_xml_tool-macos-x86_64.zip vm_xml_tool-macos-x86_64/

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/vm_xml_tool-windows-x86_64.zip
            artifacts/vm_xml_tool-linux-x86_64.zip
            artifacts/vm_xml_tool-macos-x86_64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
